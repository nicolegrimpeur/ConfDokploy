global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets: ["192.168.0.128:9100"]
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8082"]
